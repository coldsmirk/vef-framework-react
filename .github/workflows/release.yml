name: Release

# Publish all packages to npm and cut a GitHub Release. Trigger: push a version
# tag (v*) — e.g. `pnpm version:minor`, then commit, tag, and `git push --follow-tags`.
# The tag must match the root package.json version. Release notes are generated by
# git-cliff from Conventional Commits (see cliff.toml).
on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC for npm (enables trusted publishing later; npm provenance needs a public repo)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so git-cliff can build the changelog

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org" # writes .npmrc so pnpm publish authenticates

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match root package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        # No --provenance: npm provenance requires a public source repo. Add it back
        # if the GitHub repo is public.
        run: pnpm --filter="./packages/*" publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ steps.changelog.outputs.content }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "$NOTES"

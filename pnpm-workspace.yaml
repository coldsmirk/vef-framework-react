packages:
  - playground
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  msw: true

gitChecks: false

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - msw

overrides:
  brace-expansion: '>=5.0.5'
  minimatch: '>=10.2.3'
  picomatch: '>=4.0.4'
  postcss: '>=8.5.10'
  rollup: '>=4.59.0'
  svgo: '>=3.3.3'
  yaml: '>=1.10.3'
